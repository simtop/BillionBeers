name: Record Screenshots

on:
  workflow_dispatch:
    inputs:
      record_all:
        description: 'ALL Modules'
        type: boolean
        required: false
        default: false
      modules:
        description: 'Space-separated module paths (e.g., :feature:beerslist :presentation_utils).'
        required: false
        default: ''
      use_clean:
        description: 'Clean'
        type: boolean
        required: false
        default: false

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Record Screenshots
        run: |
          RECORD_ALL="${{ github.event.inputs.record_all }}"
          MODULE_INPUT="${{ github.event.inputs.modules }}"
          USE_CLEAN="${{ github.event.inputs.use_clean }}"
          
          COMMAND=""
          
          if [ "$RECORD_ALL" = "true" ]; then
            if [ "$USE_CLEAN" = "true" ]; then
              COMMAND="cleanRecordPaparazziDebug"
            else
              COMMAND="recordPaparazziDebug"
            fi
          elif [ -n "$MODULE_INPUT" ]; then
            # Split by space and construct command
            for MOD in $MODULE_INPUT; do
              # Trim whitespace (though not strictly needed with space split in bash)
              CLEAN_MOD=$(echo "$MOD" | xargs)
              if [ "$USE_CLEAN" = "true" ]; then
                COMMAND="$COMMAND ${CLEAN_MOD}:clean"
              fi
              COMMAND="$COMMAND ${CLEAN_MOD}:recordPaparazziDebug"
            done
          else
            echo "Error: You must either select 'Record All' or provide specific modules."
            exit 1
          fi
          
          echo "Running command: ./gradlew $COMMAND"
          ./gradlew $COMMAND

      - name: Archive New Snapshots
        uses: actions/upload-artifact@v4
        with:
          name: recorded-snapshots
          path: '**/src/test/snapshots/images/'
