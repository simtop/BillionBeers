name: Record Screenshots

on:
  workflow_dispatch:
    inputs:
      record_all:
        description: 'ALL Modules'
        type: boolean
        required: false
        default: false
      modules:
        description: 'Space-separated module paths (e.g., :feature:beerslist :presentation_utils).'
        required: false
        default: ''
      use_clean:
        description: 'Clean'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Screenshot Branch
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SCREENSHOT_BRANCH="${BRANCH_NAME}_screenshots"
          echo "SCREENSHOT_BRANCH=$SCREENSHOT_BRANCH" >> $GITHUB_ENV
          git checkout -b "$SCREENSHOT_BRANCH"

      - name: Record Screenshots
        run: |
          RECORD_ALL="${{ github.event.inputs.record_all }}"
          MODULE_INPUT="${{ github.event.inputs.modules }}"
          USE_CLEAN="${{ github.event.inputs.use_clean }}"
          
          COMMAND=""
          
          if [ "$RECORD_ALL" = "true" ]; then
            if [ "$USE_CLEAN" = "true" ]; then
              COMMAND="cleanRecordPaparazziDebug"
            else
              COMMAND="recordPaparazziDebug"
            fi
          elif [ -n "$MODULE_INPUT" ]; then
            # Split by space and construct command
            for MOD in $MODULE_INPUT; do
              # Trim whitespace (though not strictly needed with space split in bash)
              CLEAN_MOD=$(echo "$MOD" | xargs)
              if [ "$USE_CLEAN" = "true" ]; then
                COMMAND="$COMMAND ${CLEAN_MOD}:clean"
              fi
              COMMAND="$COMMAND ${CLEAN_MOD}:recordPaparazziDebug"
            done
          else
            echo "Error: You must either select 'Record All' or provide specific modules."
            exit 1
          fi
          
          echo "Running command: ./gradlew assembleDebug testDebugClasses $COMMAND"
          ./gradlew assembleDebug testDebugClasses $COMMAND

      - name: Commit and Push Screenshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find . -path "*/src/test/snapshots/images" -type d -exec git add -A {} +
          
          if git diff --cached --quiet; then
            echo "No changes in screenshots. Skipping commit and push."
          else
            git commit -m "Regenerate screenshots for $GITHUB_REF_NAME"
            git push origin "$SCREENSHOT_BRANCH" --force
            
            # Check if PR already exists
            PR_EXISTS=$(gh pr list --head "$SCREENSHOT_BRANCH" --base "$GITHUB_REF_NAME" --json number --jq '.[0].number')
            
            if [ -z "$PR_EXISTS" ]; then
              gh pr create \
                --title "📸 Screenshot updates for $GITHUB_REF_NAME" \
                --body "This PR was automatically generated to update the screenshot golden values for branch **$GITHUB_REF_NAME**." \
                --base "$GITHUB_REF_NAME" \
                --head "$SCREENSHOT_BRANCH"
            else
              echo "PR already exists: #$PR_EXISTS. Branch updated."
            fi
          fi

      - name: Archive New Snapshots
        uses: actions/upload-artifact@v4
        with:
          name: recorded-snapshots
          path: '**/src/test/snapshots/images/'
